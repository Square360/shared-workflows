name: Reusable Deploy to Pantheon Multidev

on:
  workflow_call:
    inputs:
      pantheon_site:
        description: 'Pantheon site name'
        required: true
        type: string
      target_env:
        description: 'Target environment name'
        required: true
        type: string
      slack_channel:
        description: 'Slack channel for notifications (e.g., #deployments)'
        required: false
        type: string
      workflow_skip_terminus:
        description: 'Skip post-deployment Terminus commands (database updates, config import, cache rebuild)'
        required: false
        type: boolean
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
        description: '1Password service account token — loads all CI secrets from s360-cicd vault'

defaults:
  run:
    shell: bash

jobs:
  deploy_to_multidev:
    name: Deploy To Multidev ${{ inputs.target_env }}
    permissions:
      deployments: write
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      multidev_url: ${{ steps.multidev_url.outputs.url }}
      error_message: ${{ steps.capture_error.outputs.error_message }}
      failed_step: ${{ steps.capture_error.outputs.failed_step }}
    steps:
    - uses: actions/checkout@v6
      with:
        # Use shallow clone to let pantheon action handle unshallowing
        fetch-depth: 1

    - name: Configure 1Password
      uses: 1password/load-secrets-action/configure@v2
      with:
        service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    - name: Load secrets
      uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        PANTHEON_MACHINE_TOKEN: op://s360-cicd/pantheon/machine-token
        PANTHEON_SSH_KEY: op://s360-cicd/pantheon/ssh-key
        CLICKUP_API_TOKEN: op://s360-cicd/clickup/api-token
        CLICKUP_TEAM_ID: op://s360-cicd/clickup/team-id

    - name: Install Terminus
      env:
        TERMINUS_MACHINE_TOKEN: ${{ env.PANTHEON_MACHINE_TOKEN }}
      run: |
        TERMINUS_VERSION=$(curl -s https://api.github.com/repos/pantheon-systems/terminus/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        curl -fsSL "https://github.com/pantheon-systems/terminus/releases/download/${TERMINUS_VERSION}/terminus.phar" -o /usr/local/bin/terminus
        chmod +x /usr/local/bin/terminus
        terminus --version
        terminus auth:login --machine-token="$TERMINUS_MACHINE_TOKEN"

    - name: Determine source environment
      id: source_env
      env:
        TERMINUS_MACHINE_TOKEN: ${{ env.PANTHEON_MACHINE_TOKEN }}
      run: |
        TARGET_ENV="${{ inputs.target_env }}"

        # For pr- multidevs, always use dev
        if [[ "$TARGET_ENV" == pr-* ]]; then
          echo "source_env=dev" >> $GITHUB_OUTPUT
          echo "Using 'dev' as source environment for pr- multidev"
        # For rc- multidevs, use live if it exists, otherwise dev
        elif [[ "$TARGET_ENV" == rc-* ]]; then
          # Check if live environment exists
          if terminus env:list ${{ inputs.pantheon_site }} --format=list | grep -q "^live$"; then
            echo "source_env=live" >> $GITHUB_OUTPUT
            echo "Using 'live' as source environment for rc- multidev"
          else
            echo "source_env=dev" >> $GITHUB_OUTPUT
            echo "'live' environment not found, using 'dev' as source environment"
          fi
        # For all other multidevs, default to dev
        else
          echo "source_env=dev" >> $GITHUB_OUTPUT
          echo "Using 'dev' as default source environment"
        fi

    - name: Check if multidev environment exists
      id: check_env
      env:
        TERMINUS_MACHINE_TOKEN: ${{ env.PANTHEON_MACHINE_TOKEN }}
      run: |
        echo "Checking if environment ${{ inputs.pantheon_site }}.${{ inputs.target_env }} exists..."
        terminus env:info ${{ inputs.pantheon_site }}.${{ inputs.target_env }} && ENV_EXISTS=true || ENV_EXISTS=false
        echo "terminus env:info exit result: $ENV_EXISTS"
        if [[ "$ENV_EXISTS" == "true" ]]; then
          echo "env_is_new=false" >> $GITHUB_OUTPUT
          echo "Multidev environment already exists, ClickUp comment will say 'updated'"
        else
          echo "env_is_new=true" >> $GITHUB_OUTPUT
          echo "Multidev environment is new, ClickUp comment will say 'created'"
        fi

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        tools: composer:v2

    - name: Add Bitbucket to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts

    - name: Get Composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction

    - name: Deploy to Pantheon multidev
      id: deploy_multidev
      uses: pantheon-systems/push-to-pantheon@0.9.0
      env:
        COMPOSER_NO_SECURITY_BLOCKING: 1
      with:
        ssh_key: ${{ env.PANTHEON_SSH_KEY }}
        machine_token: ${{ env.PANTHEON_MACHINE_TOKEN }}
        site: ${{ inputs.pantheon_site }}
        target_env: ${{ inputs.target_env }}
        source_env: ${{ steps.source_env.outputs.source_env }}
        git_user_name: ${{ github.event.pull_request.user.login || github.actor }}
        git_user_email: ${{ github.event.pull_request.user.email || format('{0}@users.noreply.github.com', github.actor) }}
        git_commit_message: "Automated deployment from GitHub Actions to multidev ${{ inputs.target_env }}"
        delete_old_environments: false
        clone_content: false

    - name: Run config imports and db updates
      if: ${{ !inputs.workflow_skip_terminus }}
      id: drush_commands
      env:
        TERMINUS_MACHINE_TOKEN: ${{ env.PANTHEON_MACHINE_TOKEN }}
      run: |
        # Check PR title for order preference and verbosity
        # Use HERE document to safely handle all special characters
        read -r -d '' PR_TITLE <<'EOF' || true
        ${{ github.event.pull_request.title }}
        EOF

        # Set -v flag only when [verbose] tag is present in PR title
        UPDB_FLAGS="-y"
        if [[ "$PR_TITLE" == *"[verbose]"* ]]; then
          echo "🔍 Verbose updb enabled (detected [verbose] tag)"
          UPDB_FLAGS="-y -v"
        fi

        if [[ "$PR_TITLE" == *"[config-first]"* ]]; then
          echo "🔧 Running config import first (detected [config-first] tag)"
          terminus -n drush ${{ inputs.pantheon_site }}.${{ inputs.target_env }} -- cim -y
          terminus -n drush ${{ inputs.pantheon_site }}.${{ inputs.target_env }} -- updb $UPDB_FLAGS
        else
          echo "🔧 Running database update first (default order)"
          terminus -n drush ${{ inputs.pantheon_site }}.${{ inputs.target_env }} -- updb $UPDB_FLAGS
          terminus -n drush ${{ inputs.pantheon_site }}.${{ inputs.target_env }} -- cim -y
        fi

        # Always run cache rebuild last
        terminus -n env:clear-cache ${{ inputs.pantheon_site }}.${{ inputs.target_env }}

    - name: Get multidev URL
      id: multidev_url
      env:
        TERMINUS_MACHINE_TOKEN: ${{ env.PANTHEON_MACHINE_TOKEN }}
      run: |
        URL=$(terminus env:view ${{ inputs.pantheon_site }}.${{ inputs.target_env }} --print)
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "Multidev environment available at: $URL"

    - name: Comment on ClickUp task with multidev URL
      id: clickup_comment
      continue-on-error: true
      env:
        CLICKUP_API_TOKEN: ${{ env.CLICKUP_API_TOKEN }}
        CLICKUP_TEAM_ID: ${{ env.CLICKUP_TEAM_ID }}
      run: |
        set -x
        if [[ -z "$CLICKUP_API_TOKEN" || -z "$CLICKUP_TEAM_ID" ]]; then
          echo "CLICKUP_API_TOKEN or CLICKUP_TEAM_ID not set, skipping ClickUp comment"
          exit 0
        fi
        BRANCH="${{ github.head_ref || github.ref_name }}"
        PR_TITLE="${{ github.event.pull_request.title }}"
        echo "Branch: $BRANCH"
        echo "PR Title: $PR_TITLE"
        # Extract ClickUp Custom ID (e.g. NJ2P-793, S360-835) from branch name or PR title
        TASK_ID=$(echo "$BRANCH $PR_TITLE" | grep -oP '[A-Z][A-Z0-9]+-[0-9]+' | head -1 || true)
        if [[ -z "$TASK_ID" ]]; then
          echo "No ClickUp task ID found in branch name or PR title, skipping comment"
          exit 0
        fi
        echo "Found ClickUp task ID: $TASK_ID"
        URL="${{ steps.multidev_url.outputs.url }}"
        if [[ "${{ steps.check_env.outputs.env_is_new }}" == "true" ]]; then
          ACTION="created"
        else
          ACTION="updated"
        fi
        TARGET_ENV="${{ inputs.target_env }}"
        if [[ "$TARGET_ENV" =~ ^pr-[0-9]+$ ]]; then
          ENV_LABEL="WIP Multidev"
        elif [[ "$TARGET_ENV" =~ ^rc-[0-9]{4}-[0-9]+$ ]]; then
          ENV_LABEL="Release Candidate Multidev"
        else
          ENV_LABEL="Multidev"
        fi
        PR_NUMBER="${{ github.event.pull_request.number }}"
        REPO="${{ github.repository }}"
        if [[ -n "$PR_NUMBER" ]]; then
          PR_LINE="\nPull Request: https://github.com/${REPO}/pull/${PR_NUMBER}"
        else
          PR_LINE=""
        fi
        RESPONSE=$(curl -s -o /tmp/clickup_response.json -w "%{http_code}" -X POST \
          "https://api.clickup.com/api/v2/task/${TASK_ID}/comment?custom_task_ids=true&team_id=${CLICKUP_TEAM_ID}" \
          -H "Authorization: ${CLICKUP_API_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"comment_text\": \"The ${ENV_LABEL} environment was ${ACTION}: ${URL}\n\nEnvironment: ${{ inputs.target_env }}\nSite: ${{ inputs.pantheon_site }}${PR_LINE}\"}" || true)
        echo "ClickUp API response code: $RESPONSE"
        echo "ClickUp API response body:"
        cat /tmp/clickup_response.json || true
        if [[ "$RESPONSE" != "200" ]]; then
          echo "Warning: ClickUp comment may not have been posted (HTTP $RESPONSE)"
        fi

    - name: Comment on PR with multidev URL
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v8
      with:
        script: |
          const url = '${{ steps.multidev_url.outputs.url }}';
          const comment = `🚀 **Multidev Environment Ready!**

          Your changes have been deployed to: <a href="${url}" target="_blank">${url}</a>

          Environment: \`${{ inputs.target_env }}\`
          Site: \`${{ inputs.pantheon_site }}\``;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: Capture error information
      id: capture_error
      if: ${{ failure() }}
      run: |
        # Determine which step failed and capture relevant error info
        if [[ "${{ steps.deploy_multidev.conclusion }}" == "failure" ]]; then
          echo "failed_step=Multidev Deployment" >> $GITHUB_OUTPUT
          echo "error_message=Failed to deploy to Pantheon multidev environment. Check the deployment logs for details." >> $GITHUB_OUTPUT
        elif [[ "${{ steps.drush_commands.conclusion }}" == "failure" ]]; then
          echo "failed_step=Drush Commands" >> $GITHUB_OUTPUT
          echo "error_message=Failed to run database updates, config import, or cache rebuild on multidev." >> $GITHUB_OUTPUT
        elif [[ "${{ steps.multidev_url.conclusion }}" == "failure" ]]; then
          echo "failed_step=Multidev URL" >> $GITHUB_OUTPUT
          echo "error_message=Failed to retrieve multidev environment URL from Pantheon." >> $GITHUB_OUTPUT
        else
          echo "failed_step=Unknown" >> $GITHUB_OUTPUT
          echo "error_message=Multidev deployment failed at an unknown step. Check the workflow logs." >> $GITHUB_OUTPUT
        fi

  notify_slack:
    name: Notify Slack
    needs: [deploy_to_multidev]
    if: ${{ always() && inputs.slack_channel }}
    runs-on: ubuntu-latest
    steps:
    - name: Configure 1Password
      uses: 1password/load-secrets-action/configure@v2
      with:
        service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    - name: Load secrets
      uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        SLACK_BOT_TOKEN: op://s360-cicd/slack/bot-token

    - name: Send Slack notification
      env:
        SLACK_BOT_TOKEN: ${{ env.SLACK_BOT_TOKEN }}
      run: |
        # Determine status and message
        if [[ "${{ needs.deploy_to_multidev.result }}" == "success" ]]; then
          STATUS_EMOJI=":white_check_mark:"
          STATUS_COLOR="good"
          STATUS_TEXT="Success"
        elif [[ "${{ needs.deploy_to_multidev.result }}" == "failure" ]]; then
          STATUS_EMOJI=":x:"
          STATUS_COLOR="danger"
          STATUS_TEXT="Failed"
        elif [[ "${{ needs.deploy_to_multidev.result }}" == "cancelled" ]]; then
          STATUS_EMOJI=":warning:"
          STATUS_COLOR="warning"
          STATUS_TEXT="Cancelled"
        else
          STATUS_EMOJI=":question:"
          STATUS_COLOR="#808080"
          STATUS_TEXT="Unknown"
        fi

        # Build environment URL field if successful
        ENV_URL_FIELD=""
        if [[ "${{ needs.deploy_to_multidev.result }}" == "success" && -n "${{ needs.deploy_to_multidev.outputs.multidev_url }}" ]]; then
          ENV_URL_FIELD=",{\"title\": \"Multidev URL\", \"value\": \"<${{ needs.deploy_to_multidev.outputs.multidev_url }}|${{ needs.deploy_to_multidev.outputs.multidev_url }}>\", \"short\": false}"
        fi

        # Add PR link if this is a PR
        PR_FIELD=""
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          # Properly escape PR title using jq (output is already quoted JSON string)
          PR_TITLE_ESCAPED=$(echo '${{ github.event.pull_request.title }}' | jq -Rs .)
          # Construct JSON field with escaped title (don't add extra quotes)
          PR_FIELD=",{\"title\": \"Pull Request\", \"value\": \"<https://github.com/${{ github.repository }}/pull/${{ github.event.number }}|#${{ github.event.number }}>\", \"short\": false},{\"title\": \"PR Title\", \"value\": ${PR_TITLE_ESCAPED}, \"short\": false}"
        fi

        # Add error information if deployment failed
        ERROR_FIELD=""
        if [[ "${{ needs.deploy_to_multidev.result }}" == "failure" ]]; then
          FAILED_STEP="${{ needs.deploy_to_multidev.outputs.failed_step }}"
          ERROR_MSG="${{ needs.deploy_to_multidev.outputs.error_message }}"
          if [[ -n "$FAILED_STEP" && -n "$ERROR_MSG" ]]; then
            # Properly escape JSON values using jq
            FAILED_STEP_ESCAPED=$(echo "$FAILED_STEP" | jq -Rs .)
            ERROR_MSG_ESCAPED=$(echo "$ERROR_MSG" | jq -Rs .)
            ERROR_FIELD=",{\"title\": \"Failed Step\", \"value\": ${FAILED_STEP_ESCAPED}, \"short\": true},{\"title\": \"Error Details\", \"value\": ${ERROR_MSG_ESCAPED}, \"short\": false}"
          else
            ERROR_FIELD=",{\"title\": \"Error Details\", \"value\": \"Multidev deployment failed. Check the workflow logs for more details.\", \"short\": false}"
          fi
        fi

        # Send to Slack using Bot API
        if [[ -n "$SLACK_BOT_TOKEN" ]]; then
          curl -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "{
              \"channel\": \"${{ inputs.slack_channel }}\",
              \"text\": \"${STATUS_EMOJI} Multidev Deployment ${STATUS_TEXT}\",
              \"attachments\": [
                {
                  \"color\": \"${STATUS_COLOR}\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"${{ github.repository }}\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Environment\",
                      \"value\": \"${{ inputs.target_env }}\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Site\",
                      \"value\": \"${{ inputs.pantheon_site }}\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Status\",
                      \"value\": \"${STATUS_TEXT}\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Workflow\",
                      \"value\": \"<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\",
                      \"short\": false
                    }
                    ${ENV_URL_FIELD}
                    ${PR_FIELD}
                    ${ERROR_FIELD}
                  ],
                  \"footer\": \"GitHub Actions\",
                  \"ts\": $(date +%s)
                }
              ]
            }" \
            https://slack.com/api/chat.postMessage
        else
          echo "SLACK_BOT_TOKEN not provided, skipping Slack notification"
        fi
