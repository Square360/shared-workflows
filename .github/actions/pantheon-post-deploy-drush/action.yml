name: 'Pantheon post-deploy Drush commands'
description: 'Runs `drush deploy` (updatedb → cache:rebuild → config:import → cache:rebuild → deploy:hook), forces maintenance mode off, then flushes the Pantheon edge cache. Honors [verbose] PR-title flag for -v on drush deploy. Requires Terminus to already be installed and authenticated.'

inputs:
  site:
    description: 'Pantheon site machine name'
    required: true
  env:
    description: 'Pantheon environment name (e.g. dev, pr-22, rc-2026-21, epr-757)'
    required: true
  machine_token:
    description: 'Pantheon machine token (required for terminus drush). Pass from caller-side secrets.PANTHEON_MACHINE_TOKEN.'
    required: true
  skip:
    description: 'If "true", skip running drush commands entirely. Pass the workflow_skip_terminus input through.'
    required: false
    default: 'false'
  pr_title:
    description: 'PR title (for [verbose] flag detection). Leave empty for non-PR triggers — the flag will not match and default flags apply.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # After git-pushing a fresh build artifact to Pantheon, the new vendor/
    # and web/core/ trees take seconds-to-minutes to propagate to the env's
    # application container filesystem. If drush runs too early it bootstraps
    # against a partial tree and dies — either during shutdown (lazy-loaded
    # hook classes missing) or during the command itself (Drupal Kernel
    # init can't find web/core/lib/Drupal/Core/Render/HtmlResponse.php etc.).
    #
    # Probe with `drush ev '\Drupal::VERSION'` — it exercises the full Drupal
    # bootstrap path (Kernel + autoload + core includes), same as updb/cim.
    # Lighter probes like `core:status` can pass while web/core/* is still
    # syncing, especially on freshly-created multidevs (PR/RC/epic).
    - name: Wait for Pantheon env filesystem to settle after code push
      if: ${{ inputs.skip != 'true' }}
      shell: bash
      env:
        TERMINUS_MACHINE_TOKEN: ${{ inputs.machine_token }}
        SITE: ${{ inputs.site }}
        ENV: ${{ inputs.env }}
      run: |
        echo "Waiting for ${SITE}.${ENV} to settle after code push (full Drupal bootstrap probe)..."
        MAX_ATTEMPTS=90
        for i in $(seq 1 ${MAX_ATTEMPTS}); do
          if terminus -n drush "${SITE}.${ENV}" -- ev 'echo \Drupal::VERSION;' >/dev/null 2>&1; then
            echo "✅ ${SITE}.${ENV} drush+Drupal bootstrap is ready (attempt ${i})"
            break
          fi
          if [ "$i" -eq "${MAX_ATTEMPTS}" ]; then
            echo "::warning::Timed out after ${MAX_ATTEMPTS} attempts (~3min) waiting for Drupal bootstrap on ${SITE}.${ENV}; proceeding anyway"
            break
          fi
          sleep 2
        done

    - name: Run drush deploy
      if: ${{ inputs.skip != 'true' }}
      shell: bash
      env:
        TERMINUS_MACHINE_TOKEN: ${{ inputs.machine_token }}
        PR_TITLE: ${{ inputs.pr_title }}
        SITE: ${{ inputs.site }}
        ENV: ${{ inputs.env }}
      run: |
        # `drush deploy` runs the canonical sequence:
        #   1. updatedb --no-cache-clear   (hook_update_N)
        #   2. cache:rebuild               (container sees updb's schema/state)
        #   3. config:import               (new config imports against fresh container)
        #   4. cache:rebuild               (next request sees imported config)
        #   5. deploy:hook                 (hook_deploy_NAME — data work that needs new config)
        # Data migrations that depend on imported config belong in MODULE.deploy.php
        # (hook_deploy_NAME), not hook_update_N. See Drush docs: drush.org/deploycommand
        DEPLOY_FLAGS="-y"
        if [[ "$PR_TITLE" == *"[verbose]"* ]]; then
          echo "🔍 Verbose deploy enabled (detected [verbose] tag)"
          DEPLOY_FLAGS="-y -v"
        fi

        # Even after the Drupal-bootstrap wait passes, drush can still hit
        # transient failures while the appserver finishes settling: lazy-
        # loaded classes not yet synced (symfony/console ConsoleErrorEvent,
        # http-foundation Response, etc.), or PhpStorage mkdir() Permission
        # Denied during cache:rebuild as the writable mounts come online.
        # Heavy PRs (Drupal/Symfony security updates) widen this window and
        # can outlast a single short retry, so we use progressive backoff:
        # 30s → 60s → 180s (4 attempts, ~4.5min worst-case wait). `drush
        # deploy` and `env:clear-cache` are both idempotent so retrying is
        # safe even if an attempt partially succeeded — drush deploy's
        # sub-commands (updb, cr, cim, deploy:hook) are each individually
        # idempotent.
        retry_drush() {
          local cmd_desc="$1"
          shift
          local backoffs=(30 60 180)
          local max_attempts=$((${#backoffs[@]} + 1))
          for i in $(seq 1 $max_attempts); do
            if "$@"; then
              [ "$i" -gt 1 ] && echo "✅ ${cmd_desc} succeeded on attempt ${i}"
              return 0
            fi
            if [ "$i" -lt "$max_attempts" ]; then
              local wait="${backoffs[$((i-1))]}"
              echo "::warning::${cmd_desc} failed on attempt ${i}; waiting ${wait}s before retry..."
              sleep "$wait"
            fi
          done
          echo "::error::${cmd_desc} failed after ${max_attempts} attempts"
          return 1
        }

        echo "🚀 Running drush deploy (updb → cr → cim → cr → deploy:hook)"
        retry_drush "drush deploy" terminus -n drush "${SITE}.${ENV}" -- deploy $DEPLOY_FLAGS

        # Belt-and-braces: drush deploy can leave the site in maintenance
        # mode if an update hook or deploy hook enabled it (or if the caller
        # workflow set it pre-deploy and crashed before unsetting). Force
        # it off and rebuild caches so the maintenance state propagates.
        # state:set is idempotent — safe to retry.
        echo "🔓 Forcing maintenance mode off"
        retry_drush "maintenance_mode off" terminus -n drush "${SITE}.${ENV}" -- state:set system.maintenance_mode 0 --input-format=integer -y
        retry_drush "cache:rebuild" terminus -n drush "${SITE}.${ENV}" -- cache:rebuild

        # drush deploy's internal cache:rebuild clears Drupal's container
        # cache but not Pantheon's edge/CDN cache. Flush it so users see
        # the deployed code on the next request.
        retry_drush "env:clear-cache" terminus -n env:clear-cache "${SITE}.${ENV}"
