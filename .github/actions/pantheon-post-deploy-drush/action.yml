name: 'Pantheon post-deploy Drush commands'
description: 'Runs database updates (updb), config import (cim), and cache rebuild via Terminus drush on a Pantheon environment. Honors [config-first] (run cim before updb) and [verbose] (verbose updb) PR-title flags. Requires Terminus to already be installed and authenticated.'

inputs:
  site:
    description: 'Pantheon site machine name'
    required: true
  env:
    description: 'Pantheon environment name (e.g. dev, pr-22, rc-2026-21, epr-757)'
    required: true
  machine_token:
    description: 'Pantheon machine token (required for terminus drush). Pass from caller-side secrets.PANTHEON_MACHINE_TOKEN.'
    required: true
  skip:
    description: 'If "true", skip running drush commands entirely. Pass the workflow_skip_terminus input through.'
    required: false
    default: 'false'
  pr_title:
    description: 'PR title (for [config-first] and [verbose] flag detection). Leave empty for non-PR triggers — flags will not match and default ordering applies.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # After git-pushing a fresh build artifact to Pantheon, the new vendor/
    # and web/core/ trees take seconds-to-minutes to propagate to the env's
    # application container filesystem. If drush runs too early it bootstraps
    # against a partial tree and dies — either during shutdown (lazy-loaded
    # hook classes missing) or during the command itself (Drupal Kernel
    # init can't find web/core/lib/Drupal/Core/Render/HtmlResponse.php etc.).
    #
    # Probe with `drush ev '\Drupal::VERSION'` — it exercises the full Drupal
    # bootstrap path (Kernel + autoload + core includes), same as updb/cim.
    # Lighter probes like `core:status` can pass while web/core/* is still
    # syncing, especially on freshly-created multidevs (PR/RC/epic).
    - name: Wait for Pantheon env filesystem to settle after code push
      if: ${{ inputs.skip != 'true' }}
      shell: bash
      env:
        TERMINUS_MACHINE_TOKEN: ${{ inputs.machine_token }}
        SITE: ${{ inputs.site }}
        ENV: ${{ inputs.env }}
      run: |
        echo "Waiting for ${SITE}.${ENV} to settle after code push (full Drupal bootstrap probe)..."
        MAX_ATTEMPTS=90
        for i in $(seq 1 ${MAX_ATTEMPTS}); do
          if terminus -n drush "${SITE}.${ENV}" -- ev 'echo \Drupal::VERSION;' >/dev/null 2>&1; then
            echo "✅ ${SITE}.${ENV} drush+Drupal bootstrap is ready (attempt ${i})"
            break
          fi
          if [ "$i" -eq "${MAX_ATTEMPTS}" ]; then
            echo "::warning::Timed out after ${MAX_ATTEMPTS} attempts (~3min) waiting for Drupal bootstrap on ${SITE}.${ENV}; proceeding anyway"
            break
          fi
          sleep 2
        done

    - name: Run config imports and db updates
      if: ${{ inputs.skip != 'true' }}
      shell: bash
      env:
        TERMINUS_MACHINE_TOKEN: ${{ inputs.machine_token }}
        PR_TITLE: ${{ inputs.pr_title }}
        SITE: ${{ inputs.site }}
        ENV: ${{ inputs.env }}
      run: |
        UPDB_FLAGS="-y"
        if [[ "$PR_TITLE" == *"[verbose]"* ]]; then
          echo "🔍 Verbose updb enabled (detected [verbose] tag)"
          UPDB_FLAGS="-y -v"
        fi

        # Even after the Drupal-bootstrap wait passes, individual drush
        # commands can still hit transient include() failures when their
        # specific lazy-loaded classes haven't synced to the appserver
        # container yet (symfony/console error events, http-foundation
        # Response, etc.). cim in particular hits this — its post-prompt
        # code path lazy-loads classes that updb doesn't touch. One retry
        # with a 30s backoff covers nearly all of these. Drush commands
        # here (updb, cim, env:clear-cache) are idempotent so retrying is
        # safe even if attempt 1 partially succeeded.
        retry_drush() {
          local cmd_desc="$1"
          shift
          local max_attempts=2
          for i in $(seq 1 $max_attempts); do
            if "$@"; then
              [ "$i" -gt 1 ] && echo "✅ ${cmd_desc} succeeded on attempt ${i}"
              return 0
            fi
            if [ "$i" -lt "$max_attempts" ]; then
              echo "::warning::${cmd_desc} failed on attempt ${i}; waiting 30s before retry..."
              sleep 30
            fi
          done
          echo "::error::${cmd_desc} failed after ${max_attempts} attempts"
          return 1
        }

        if [[ "$PR_TITLE" == *"[config-first]"* ]]; then
          echo "🔧 Running config import first (detected [config-first] tag)"
          retry_drush "drush cim" terminus -n drush "${SITE}.${ENV}" -- cim -y
          retry_drush "drush updb" terminus -n drush "${SITE}.${ENV}" -- updb $UPDB_FLAGS
        else
          echo "🔧 Running database update first (default order)"
          retry_drush "drush updb" terminus -n drush "${SITE}.${ENV}" -- updb $UPDB_FLAGS
          retry_drush "drush cim" terminus -n drush "${SITE}.${ENV}" -- cim -y
        fi

        retry_drush "env:clear-cache" terminus -n env:clear-cache "${SITE}.${ENV}"
