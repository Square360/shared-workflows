name: 'Push code to a Pantheon environment'
description: 'Sets up PHP, installs Composer dependencies, and pushes the current workspace to a Pantheon environment via pantheon-systems/push-to-pantheon. Assumes the repo is already checked out.'

inputs:
  site:
    description: 'Pantheon site machine name'
    required: true
  target_env:
    description: 'Target Pantheon environment (dev, test, live, or a multidev like pr-22 / rc-2026-21 / epr-757)'
    required: true
  source_env:
    description: 'Source environment for multidev clone (e.g. dev or live). Leave empty for non-multidev deploys (i.e. when target_env is dev/test/live).'
    required: false
    default: ''
  ssh_key:
    description: 'SSH key for Pantheon git access. Pass from caller-side secrets.PANTHEON_SSH_KEY.'
    required: true
  machine_token:
    description: 'Pantheon machine token. Pass from caller-side secrets.PANTHEON_MACHINE_TOKEN.'
    required: true
  commit_message:
    description: 'Commit message used on the synthetic deploy commit.'
    required: false
    default: 'Automated deployment from GitHub Actions'
  php_version:
    description: 'PHP version for the build runner.'
    required: false
    default: '8.4'

runs:
  using: 'composite'
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php_version }}
        tools: composer:v2

    - name: Add Bitbucket to known hosts
      shell: bash
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      shell: bash
      run: composer install --no-dev --optimize-autoloader --no-interaction

    # We build on Actions and push the full artifact to Pantheon (no Build
    # Tools, no integrated Composer on Pantheon). Source-repo .gitignore
    # excludes vendor/, web/core/, contrib dirs, scaffolded files — exactly
    # the files Pantheon needs. Upstream push-to-pantheon's direct-git path
    # does `git push HEAD` (scripts/main.sh:398), so the artifact has to be
    # committed before that runs.
    #
    # We commit it ourselves with --quiet so upstream's own commit step
    # (main.sh:387, gated on `! git diff --cached --quiet`) is a no-op.
    # That suppresses ~46k lines of `create mode 100644 …` diff summary
    # per deploy — the full file list is still on the commit object and
    # inspectable via `git show --stat HEAD` against the Pantheon repo.
    - name: Stage and commit Composer build artifact for Pantheon push
      shell: bash
      env:
        # Match the values passed to upstream's push-to-pantheon step below
        # so the commit author is the same whether we commit here or upstream
        # commits later. Set them inline on `git commit` (via -c) rather than
        # globally — upstream's "Configure Git User" step runs after this
        # action, and we don't want to fight it over global config.
        DEPLOY_GIT_USER_NAME: ${{ github.event.pull_request.user.login || github.actor }}
        DEPLOY_GIT_USER_EMAIL: ${{ github.event.pull_request.user.email || format('{0}@users.noreply.github.com', github.actor) }}
        DEPLOY_COMMIT_MESSAGE: ${{ inputs.commit_message }}
      run: |
        git add -A --force
        # Buffer the path list to disk: piping `git diff --name-only` directly
        # into `head -20` causes git to SIGPIPE on the 21st write, which under
        # `set -e -o pipefail` fails the whole step (v3.1.2 regression).
        STAGED_LIST=$(mktemp)
        git diff --cached --name-only > "${STAGED_LIST}"
        STAGED_COUNT=$(wc -l < "${STAGED_LIST}" | tr -d ' ')
        echo "Staged ${STAGED_COUNT} paths for push to Pantheon"
        echo "Sample (first 20):"
        head -20 "${STAGED_LIST}"
        if [ "${STAGED_COUNT}" -gt 20 ]; then
          echo "  ... ($((STAGED_COUNT - 20)) more)"
        fi
        rm -f "${STAGED_LIST}"

        if ! git diff --cached --quiet; then
          git -c user.name="${DEPLOY_GIT_USER_NAME}" \
              -c user.email="${DEPLOY_GIT_USER_EMAIL}" \
              commit -q -m "${DEPLOY_COMMIT_MESSAGE}"
          echo "Committed artifact (quiet). Upstream push step will push HEAD to Pantheon."
        else
          echo "Nothing staged after composer install; skipping pre-commit (upstream push will no-op the commit too)."
        fi

    # Pre-flight: ensure the target Pantheon env is in git mode. If it's been
    # flipped to SFTP (e.g. someone opened the Dashboard Code view and toggled
    # it), the push would be rejected by Pantheon's pre-receive hook —
    # `pantheon-systems/push-to-pantheon@0.9.0` swallows that exit code and
    # reports the step as successful. We pre-empt the most common cause here;
    # the verify-after-push step below catches anything else.
    #
    # Only applies if the env already exists. New multidevs are created in git
    # mode by terminus multidev:create (handled inside the upstream action).
    - name: Ensure Pantheon env is in git mode (pre-flight)
      shell: bash
      env:
        TERMINUS_MACHINE_TOKEN: ${{ inputs.machine_token }}
        SITE: ${{ inputs.site }}
        TARGET_ENV: ${{ inputs.target_env }}
      run: |
        set -euo pipefail
        # Use env:list (an authoritative listing) rather than env:info >/dev/null,
        # which would silently swallow auth/network errors as "env doesn't exist".
        # If terminus itself errors, set -e fails the step with the real cause.
        # Matches the existing pattern in reusable-pantheon-deploy-rc-multidev.yml
        # for the live-env probe.
        if ! terminus env:list "${SITE}" --format=list | grep -q "^${TARGET_ENV}$"; then
          echo "Env ${SITE}.${TARGET_ENV} does not exist yet; multidev:create will provision it in git mode. Skipping connection-mode check."
          exit 0
        fi
        # `connection_mode` lives on env:info, NOT on connection:info (which
        # only returns the git/sftp connection URLs and commands). v3.2.4
        # shipped with the wrong command — terminus errors with "The requested
        # field, 'connection_mode', is not defined" — and the no-stderr-swallow
        # fix from Copilot's review surfaced it.
        # No `2>/dev/null` fallback: if terminus errors here (auth, network,
        # schema drift), we want the step to fail with the real error rather
        # than coerce the result to empty and attempt connection:set on bad data.
        MODE=$(terminus env:info "${SITE}.${TARGET_ENV}" --field=connection_mode)
        echo "Current connection mode for ${SITE}.${TARGET_ENV}: ${MODE}"
        if [[ "${MODE}" != "git" ]]; then
          echo "::warning::${SITE}.${TARGET_ENV} is in '${MODE}' mode. Switching to git so the push isn't rejected by the pre-receive hook."
          terminus connection:set "${SITE}.${TARGET_ENV}" git
        fi

    - name: Push to Pantheon
      uses: pantheon-systems/push-to-pantheon@0.9.0
      env:
        COMPOSER_NO_SECURITY_BLOCKING: 1
      with:
        ssh_key: ${{ inputs.ssh_key }}
        machine_token: ${{ inputs.machine_token }}
        site: ${{ inputs.site }}
        target_env: ${{ inputs.target_env }}
        source_env: ${{ inputs.source_env }}
        git_user_name: ${{ github.event.pull_request.user.login || github.actor }}
        git_user_email: ${{ github.event.pull_request.user.email || format('{0}@users.noreply.github.com', github.actor) }}
        git_commit_message: ${{ inputs.commit_message }}
        delete_old_environments: false
        clone_content: false
        # We build on GitHub and push to Pantheon, so we don't need the Build
        # Tools plugin's create-on-Pantheon flow. The direct-git path is
        # idempotent: it checks multidev existence before calling
        # multidev:create, so re-pushes to an existing rc-/epr-/pr- multidev
        # update the code instead of failing with "environment already exists".
        skip_build_tools: true

    # Verify-after-push: pantheon-systems/push-to-pantheon@0.9.0 does NOT
    # propagate the exit code from `git push`. When Pantheon rejects the push
    # (SFTP mode, branch protection, lost-update race, etc.) the action still
    # reports the step as success and bobheadxi/deployments@v1 (also invoked
    # inside the upstream) marks the GitHub deployment "success". We compare
    # the local HEAD we meant to push against the remote ref Pantheon now has,
    # and fail the workflow loudly if they don't match. Belt-and-braces:
    # catches the SFTP case our pre-flight already handles AND any future
    # silent-fail mode in the upstream action.
    #
    # Requires the SSH agent loaded by the upstream's webfactory/ssh-agent
    # step (SSH_AUTH_SOCK is in GITHUB_ENV, so it persists into this step).
    - name: Verify push landed on Pantheon
      shell: bash
      env:
        TERMINUS_MACHINE_TOKEN: ${{ inputs.machine_token }}
        SITE: ${{ inputs.site }}
        TARGET_ENV: ${{ inputs.target_env }}
      run: |
        set -euo pipefail
        LOCAL_HEAD=$(git rev-parse HEAD)
        PANTHEON_GIT_URL=$(terminus connection:info "${SITE}.${TARGET_ENV}" --field=git_url)
        if [[ -z "${PANTHEON_GIT_URL}" ]]; then
          echo "::error::Could not determine Pantheon git URL for ${SITE}.${TARGET_ENV}; cannot verify push."
          exit 1
        fi
        echo "Local HEAD:    ${LOCAL_HEAD}"
        echo "Pantheon URL:  ${PANTHEON_GIT_URL}"
        # Retry ls-remote a few times: for freshly created multidevs there can
        # be a short window where Pantheon has accepted the push but the ref
        # isn't yet visible via ls-remote (related to the propagation race the
        # post-deploy drush step also defends against). Three attempts with
        # short backoff covers the typical lag without papering over a real
        # silent-fail.
        REMOTE_HEAD=""
        for attempt in 1 2 3; do
          REMOTE_HEAD=$(git ls-remote "${PANTHEON_GIT_URL}" "refs/heads/${TARGET_ENV}" | awk '{print $1}')
          if [[ -n "${REMOTE_HEAD}" ]]; then
            break
          fi
          if [[ ${attempt} -lt 3 ]]; then
            SLEEP=$((attempt * 5))
            echo "ls-remote returned no ref on attempt ${attempt}; retrying in ${SLEEP}s (Pantheon ref propagation lag)..."
            sleep "${SLEEP}"
          fi
        done
        echo "Pantheon HEAD: ${REMOTE_HEAD:-<empty>}"
        if [[ -z "${REMOTE_HEAD}" ]]; then
          echo "::error::Pantheon ${TARGET_ENV} has no commits on refs/heads/${TARGET_ENV} after 3 attempts. The upstream push silently failed or the branch was never created."
          echo "::error::Check the previous step's output for 'remote rejected' / 'pre-receive hook declined' / SFTP-mode notices."
          exit 1
        fi
        if [[ "${LOCAL_HEAD}" != "${REMOTE_HEAD}" ]]; then
          echo "::error::Pantheon ${TARGET_ENV} is at ${REMOTE_HEAD}, expected ${LOCAL_HEAD}. The upstream push silently failed."
          echo "::error::Check the previous step's output for 'remote rejected' / 'pre-receive hook declined' / SFTP-mode notices."
          exit 1
        fi
        echo "✅ Pantheon ${TARGET_ENV} is at ${LOCAL_HEAD} as expected."
